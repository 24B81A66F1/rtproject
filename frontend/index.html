<!DOCTYPE html>
<html>
<head>
    <title>Book Exchange</title>
</head>
<body>

<h1>📚 Book Exchange Platform</h1>

<nav>
    <p id="userStatus"></p>
<button onclick="logout()">Logout</button>
    <a href="index.html">Home</a> |
    <a href="login.html">Login</a> |
    <a href="requests.html">Requests</a>
</nav>

<hr>

<h2>Add a Book</h2>

<div id="bookSection">
    <form onsubmit="addBook(event)">
        <label>Book Name:</label><br>
        <input type="text" id="bookName"><br><br>

        <label>Author:</label><br>
        <input type="text" id="author"><br><br>

        <label>Upload Image:</label><br>
        <input type="file" id="image" onchange="previewImage(event)"><br><br>

        <img id="preview" width="150" style="display:none;"><br><br>

        <button type="submit">Add Book</button>
    </form>
</div>
<hr>

<h2>Available Books</h2>
<ul>
    <li>Rich Dad Poor Dad</li>
    <li>Harry Potter</li>
</ul>
<script>
    function previewImage(event) {
    let file = event.target.files[0];

    if (file) {
        let reader = new FileReader();

        reader.onload = function() {
            let img = document.getElementById("preview");
            img.src = reader.result;
            img.style.display = "block";
        }

        reader.readAsDataURL(file);
    }
}
function addBook(event) {
    event.preventDefault();
    let user = localStorage.getItem("loggedInUser");

    if (!user) {
        alert("Please login first!");
        return;
    }
   

    let name = document.getElementById("bookName").value;
    let author = document.getElementById("author").value;

    let books = JSON.parse(localStorage.getItem("books")) || [];

    books.push({ name: name, author: author });

    localStorage.setItem("books", JSON.stringify(books));

    displayBooks();

    document.getElementById("bookName").value = "";
    document.getElementById("author").value = "";
}

function displayBooks() {
    let list = document.querySelector("ul");
    list.innerHTML = "";

    let books = JSON.parse(localStorage.getItem("books")) || [];

    books.forEach((book, index) => {
        let li = document.createElement("li");

        li.innerHTML = `
            <strong>${book.name}</strong> by ${book.author}<br>
            ${book.image ? `<img src="${book.image}" width="100"><br>` : ""}
            <button onclick="deleteBook(${index})">Delete</button>
        `;

        list.appendChild(li);
    });
}
function checkLogin() {
    let user = localStorage.getItem("loggedInUser");

    let section = document.getElementById("bookSection");

    if (user) {
        document.getElementById("userStatus").textContent = "Logged in as: " + user;
        section.style.display = "block";
    } else {
        document.getElementById("userStatus").textContent = "Not logged in";
        section.style.display = "none";
    }
}
function logout() {
    localStorage.removeItem("loggedInUser");
    checkLogin();
}
function deleteBook(index) {
    let books = JSON.parse(localStorage.getItem("books")) || [];

    books.splice(index, 1);

    localStorage.setItem("books", JSON.stringify(books));

    displayBooks();
}
// Load everything
window.onload = function() {
    displayBooks();
    checkLogin();
};
</script>
</body>
</html>
