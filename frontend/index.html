<!DOCTYPE html>
<html>
<head>
    <title>Book Exchange</title>
</head>
<body>

<h1>📚 Book Exchange Platform</h1>

<nav>
    <p id="userStatus"></p>
<button onclick="logout()">Logout</button>
    <a href="index.html">Home</a> |
    <a href="login.html">Login</a> |
    <a href="requests.html">Requests</a>
</nav>

<hr>

<h2>Add a Book</h2>

<form onsubmit="addBook(event)">
    <label>Book Name:</label><br>
    <input type="text" id="bookName"><br><br>

    <label>Author:</label><br>
    <input type="text" id="author"><br><br>

    <label>Upload Image:</label><br>
    <input type="file" id="image"><br><br>

    <button type="submit">Add Book</button>
</form>

<hr>

<h2>Available Books</h2>
<ul>
    <li>Rich Dad Poor Dad</li>
    <li>Harry Potter</li>
</ul>
<script>
function addBook(event) {
    event.preventDefault();

    let name = document.getElementById("bookName").value;
    let author = document.getElementById("author").value;

    let books = JSON.parse(localStorage.getItem("books")) || [];

    books.push({ name: name, author: author });

    localStorage.setItem("books", JSON.stringify(books));

    displayBooks();

    document.getElementById("bookName").value = "";
    document.getElementById("author").value = "";
}

function displayBooks() {
    let list = document.querySelector("ul");
    list.innerHTML = "";

    let books = JSON.parse(localStorage.getItem("books")) || [];

    books.forEach(book => {
        let li = document.createElement("li");
        li.textContent = book.name + " by " + book.author;
        list.appendChild(li);
    });
}

function checkLogin() {
    let user = localStorage.getItem("loggedInUser");

    if (user) {
        document.getElementById("userStatus").textContent = "Logged in as: " + user;
    } else {
        document.getElementById("userStatus").textContent = "Not logged in";
    }
}

function logout() {
    localStorage.removeItem("loggedInUser");
    checkLogin();
}

// Load everything
window.onload = function() {
    displayBooks();
    checkLogin();
};
</script>
</body>
</html>
