<!DOCTYPE html>
<html>
<head>
    <title>Requests</title>
</head>
<body>

<h2>Request a Book</h2>

<nav>
    <a href="index.html">Home</a> |
    <a href="login.html">Login</a>
</nav>

<hr>

<form onsubmit="addRequest(event)">
    <label>Book Name:</label><br>
    <input type="text" id="reqBook"><br><br>

    <label>Author:</label><br>
    <input type="text" id="reqAuthor"><br><br>

    <button type="submit">Request</button>
</form>

<hr>

<h3>Requested Books</h3>
<ul>
    <li>Atomic Habits</li>
</ul>
<script>
function addRequest(event) {
    event.preventDefault();

    let name = document.getElementById("reqBook").value;
    let author = document.getElementById("reqAuthor").value;

    let requests = JSON.parse(localStorage.getItem("requests")) || [];

    requests.push({ name: name, author: author });

    localStorage.setItem("requests", JSON.stringify(requests));

    displayRequests();

    document.getElementById("reqBook").value = "";
    document.getElementById("reqAuthor").value = "";
}

function displayRequests() {
    let list = document.querySelector("ul");
    list.innerHTML = "";

    let requests = JSON.parse(localStorage.getItem("requests")) || [];

    requests.forEach(req => {
        let li = document.createElement("li");
        li.textContent = req.name + " by " + req.author;
        list.appendChild(li);
    });
}

window.onload = displayRequests;
</script>
</body>
</html>
